services:
  chatgpt2api-reg:
    image: ghcr.io/flyljx/regs:latest
    container_name: chatgpt2api-reg
    depends_on:
      - flaresolverr
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
      CHATGPT2API_REG_APP_ROOT: /app/reg
    volumes:
      - ./:/app
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
    ports:
      - "8191:8191"
    restart: unless-stopped

  warp:
    image: caomingjun/warp
    container_name: warp
    ports:
      - "1080:1080"
    environment:
      TZ: Asia/Shanghai
      WARP_SLEEP: "5"
    device_cgroup_rules:
      - "c 10:200 rwm"
    cap_add:
      - MKNOD
      - AUDIT_WRITE
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./warp-data:/var/lib/cloudflare-warp
    restart: unless-stopped
